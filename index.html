<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melanyphs</title>
    <style>
        /* Configuración básica y fondo de emojis */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Capa de fondo con patrón de emojis */
        body::before {
            content: "🔥 🍆 💋 👠 🌶️ 🍑 👅 ✨";
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            font-size: 24px;
            line-height: 3;
            letter-spacing: 15px;
            opacity: 0.15; /* Controla qué tan transparente se ve el fondo */
            z-index: 1;
            pointer-events: none;
            animation: moverFondo 60s linear infinite;
        }

        @keyframes moverFondo {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }

        /* Contenedor principal */
        .container {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid #ff2a5f;
            border-radius: 20px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 42, 95, 0.3);
            z-index: 2;
        }

        /* Cabecera */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #ff2a5f;
            text-transform: lowercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 42, 95, 0.6);
        }

        /* Lista de opciones */
        .lista-tips {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-tips {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 15px;
            padding: 18px 15px;
            border-radius: 12px;
            border-left: 5px solid #ff2a5f;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .item-tips:hover {
            transform: scale(1.03);
            background: rgba(255, 42, 95, 0.1);
        }

        /* Resalte para los Tips */
        .tips-cantidad {
            font-weight: bold;
            color: #ffbd03;
            text-shadow: 0 0 5px rgba(255, 189, 3, 0.4);
            flex-shrink: 0;
            margin-right: 10px;
        }

        .recompensa {
            text-align: right;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>melanyphs</h1>
        
        <ul class="lista-tips">
            <li class="item-tips">
                <span class="tips-cantidad">50 tips =</span>
                <span class="recompensa">video llamada 1 hora🔥</span>
            </li>
            <li class="item-tips">
                <span class="tips-cantidad">20 tips =</span>
                <span class="recompensa">12 videos largos🔥</span>
            </li>
            <li class="item-tips">
                <span class="tips-cantidad">10 tips =</span>
                <span class="recompensa">6 videos largos🔥</span>
            </li>
        </ul>
    </div>

</body>
</html>
